  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #E8391D;
      --red-2: #C42E15;
      --dark: #2B2B2B;
      --white: #FFFFFF;
    }

    html { scroll-behavior: smooth; }
    body { font-family: "Inter", sans-serif; background: var(--white); color: var(--dark); overflow-x: hidden; }
    * { font-style: normal !important; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 48px; height: 76px;
      background: rgba(255,255,255,0.96);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(0,0,0,0.07);
    }
    .nav-logo { display: flex; align-items: center; }
    .nav-logo img { height: 38px; width: auto; display: block; object-fit: contain; }
    .nav-links {
      position: absolute; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 40px;
      white-space: nowrap;
    }
    .nav-links a {
      font-size: 14px; font-weight: 500; color: var(--dark);
      text-decoration: none; opacity: 0.6; transition: opacity .2s;
    }
    .nav-links a:hover { opacity: 1; }

    /* DROPDOWN */
    .nav-dropdown {
      position: relative;
      padding: 8px 0;
      margin: 0 -8px;
      white-space: nowrap;
    }
    .nav-dropdown-toggle {
      font-size: 14px; font-weight: 500; color: var(--dark);
      text-decoration: none; opacity: 0.6; transition: opacity .2s, background .2s;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 8px 8px 0 0;
      display: block;
      white-space: nowrap;
    }
    .nav-dropdown:hover .nav-dropdown-toggle {
      opacity: 1;
      background: rgba(232,57,29,0.08);
    }
    .nav-dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% - 8px);
      left: 50%; transform: translateX(-50%);
      background: #fff;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: 0 0 12px 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      padding: 8px 0;
      min-width: 200px;
      z-index: 200;
      pointer-events: none;
    }
    .nav-dropdown:hover .nav-dropdown-menu {
      display: block;
      pointer-events: auto;
    }
    .nav-dropdown.active .nav-dropdown-menu {
      display: block;
      pointer-events: auto;
    }
    .nav-dropdown.active .nav-dropdown-toggle {
      opacity: 1;
      background: rgba(232,57,29,0.08);
    }
    .nav-dropdown-menu a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 500;
      color: var(--dark);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity .2s, background .2s;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      white-space: nowrap;
    }
    .nav-dropdown-menu a:last-child { border-bottom: none; }
    .nav-dropdown-menu a:hover {
      opacity: 1;
      background: rgba(232,57,29,0.08);
      color: var(--red);
    }
    .dropdown-logo {
      width: 18px; height: 18px;
      object-fit: contain; flex-shrink: 0;
      transition: transform 0.4s ease-in-out;
    }
    .nav-dropdown-menu a:hover .dropdown-logo { transform: rotate(180deg); }

    .nav-cta {
      background: var(--red); color: #fff; font-size: 14px; font-weight: 700;
      padding: 10px 22px; border-radius: 100px; text-decoration: none;
      transition: opacity .2s, transform .15s; white-space: nowrap;
    }
    .nav-cta:hover { opacity: 0.88; transform: scale(1.02); }

    .nav-insta {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 48px;
      height: 48px;
      flex-shrink: 0;
      border-radius: 50%;
      overflow: hidden;
    }
    .nav-insta img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .nav-right { display: flex; align-items: center; gap: 20px; }

    /* MOBILE NAV */
    @media (max-width: 768px) {
      nav { padding: 0 14px; height: 60px; }
      .nav-links { position: static; transform: none; gap: 14px; }
      .nav-links a { font-size: 11px; }
      .nav-dropdown-toggle { font-size: 13px; padding: 6px 10px; }
      .nav-dropdown-menu { min-width: 160px; }
      .nav-dropdown-menu a { padding: 10px 16px; font-size: 13px; }
      .nav-insta { display: none; }
      .nav-right { gap: 6px; }
      .nav-cta { font-size: 12px; padding: 8px 14px; }
    }

    /* ── FOOTER ── */
    footer {
      background: var(--red);
      color: #fff;
      padding: 40px 48px;
      text-align: left;
    }
    footer p { font-size: 13px; color: rgba(255,255,255,0.65); margin-bottom: 16px; }
    .footer-links { display: flex; gap: 24px; justify-content: flex-start; }
    .footer-links a { font-size: 13px; color: rgba(255,255,255,0.7); text-decoration: none; transition: color .2s; }
    .footer-links a:hover { color: #fff; }

    /* ── BOTÃO VOLTAR ── */
    .back-btn {
      position: fixed; top: 96px; left: 24px;
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--white);
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
      display: flex; align-items: center; justify-content: center;
      text-decoration: none;
      transition: transform .2s, box-shadow .2s;
      z-index: 99;
    }
    .back-btn:hover { transform: scale(1.08); box-shadow: 0 4px 20px rgba(0,0,0,0.18); }

    /* ── WHATSAPP ── */
    .wa-float {
      position: fixed; bottom: 32px; right: 32px; z-index: 999;
      width: 56px; height: 56px; border-radius: 50%;
      background: #25D366;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      display: flex; align-items: center; justify-content: center;
      transition: transform .2s, box-shadow .2s;
      text-decoration: none;
    }
    .wa-float:hover { transform: scale(1.1); box-shadow: 0 8px 28px rgba(0,0,0,0.18); }
    .wa-float img { width: 32px; height: 32px; object-fit: contain; display: block; }

    @media (max-width: 768px) {
      .wa-float { bottom: 24px; right: 16px; width: 48px; height: 48px; }

    /* ── CONTEÚDO DA PÁGINA COMPRA ── */

    }

      .compra-hero { padding: 40px 20px 24px; }
      .compra-content { padding: 0 20px 80px; }
    }
  </style>

<!-- DROPDOWN SCRIPT -->
<script>
  const navDropdown = document.querySelector('.nav-dropdown');
  const navDropdownToggle = document.querySelector('.nav-dropdown-toggle');

  navDropdownToggle.addEventListener('click', (e) => {
    e.preventDefault();
    navDropdown.classList.toggle('active');
  });

  document.querySelectorAll('.nav-dropdown-menu a').forEach(link => {
    link.addEventListener('click', () => {
      navDropdown.classList.remove('active');
    });
  });

  document.addEventListener('click', (e) => {
    if (!navDropdown.contains(e.target)) {
      navDropdown.classList.remove('active');
    }
  });
</script>
